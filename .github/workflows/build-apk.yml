name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/**'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalare dependențe
        working-directory: mobile
        run: npm install

      - name: Debug config
        working-directory: mobile
        run: |
          echo "=== @expo/cli version ==="
          cat node_modules/@expo/cli/package.json | grep '"version"'
          echo "=== expo config ==="
          node node_modules/expo/bin/cli config --json > /tmp/expo_out.txt 2> /tmp/expo_err.txt
          echo "Exit: $?"
          echo "--- STDOUT ---"
          cat /tmp/expo_out.txt
          echo "--- STDERR ---"
          cat /tmp/expo_err.txt

      - name: Build APK
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build -p android --profile preview --non-interactive

      - name: Descarcă APK
        working-directory: mobile
        run: |
          URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          curl -L "$URL" -o astran.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Astran-APK
          path: mobile/astran.apk
          retention-days: 30