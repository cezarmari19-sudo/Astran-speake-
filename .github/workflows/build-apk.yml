name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/**'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalare dependențe
        working-directory: mobile
        run: npm install

      - name: Debug - test node direct
        working-directory: mobile
        run: |
          echo "=== Test memoria disponibila ==="
          free -m
          echo "=== @expo/cli entry point ==="
          node -e "
            const path = require('path');
            const pkg = require('./node_modules/@expo/cli/package.json');
            console.log('main:', pkg.main);
            console.log('version:', pkg.version);
          "
          echo "=== Test require expo ==="
          node -e "
            try {
              const expo = require('./node_modules/expo/package.json');
              console.log('expo version:', expo.version);
            } catch(e) {
              console.error('EROARE:', e.message);
            }
          "
          echo "=== expo config cu timeout ==="
          timeout 60 node node_modules/expo/bin/cli config --json 2>&1 || echo "EXIT CODE: $?"

      - name: Build APK
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_NO_TELEMETRY: 1
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: eas build -p android --profile preview --non-interactive

      - name: Descarcă APK
        working-directory: mobile
        run: |
          URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          curl -L "$URL" -o astran.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Astran-APK
          path: mobile/astran.apk
          retention-days: 30