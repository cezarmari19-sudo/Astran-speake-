name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/**'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalare dependențe
        working-directory: mobile
        run: npm install

      - name: Debug config
        working-directory: mobile
        run: |
          echo "=== trace-exit ==="
          node --trace-exit node_modules/expo/bin/cli config --json 2>&1 || true
          echo "EXIT: $?"
          echo ""
          echo "=== EXPO_DEBUG=true ==="
          EXPO_DEBUG=true node node_modules/expo/bin/cli config --json 2>&1 || true
          echo "EXIT: $?"
          echo ""
          echo "=== unhandledRejection intercept ==="
          node -e "
            process.on('uncaughtException', (e) => { console.error('UNCAUGHT:', e.stack); });
            process.on('unhandledRejection', (e) => { console.error('REJECTED:', e && e.stack ? e.stack : e); });
            require('./node_modules/@expo/cli');
          " -- config --json 2>&1 || true

      - name: Build APK
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_NO_TELEMETRY: 1
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: eas build -p android --profile preview --non-interactive

      - name: Descarcă APK
        working-directory: mobile
        run: |
          URL=$(eas build:list --platform android --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          curl -L "$URL" -o astran.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Astran-APK
          path: mobile/astran.apk
          retention-days: 30